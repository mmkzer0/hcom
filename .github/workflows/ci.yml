name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Keep lint behavior reproducible across fresh runners and local installs.
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 1.97.1
        with:
          toolchain: "1.97.1"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --locked

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 1.88
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check --locked --all-targets

  # Native Windows test gate. Release artifacts are built by cargo-dist on tags;
  # the pinned real-tool lifecycle has its own matrix below.
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Keep lint behavior reproducible across fresh runners and local installs.
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 1.97.1
        with:
          toolchain: "1.97.1"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --all-targets --locked

  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1
          cache: npm
      - run: bash ./scripts/typecheck.sh

  # Fails if the checked-in release.yml has drifted from what the pinned
  # cargo-dist would generate. Version must match cargo-dist-version in
  # dist-workspace.toml so the check tracks the exact installer used on tags.
  dist-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pinned cargo-dist
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh"
      - run: dist generate --check

  real-tool-tests:
    name: Real tool (${{ matrix.tool }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            tool: codex
            package: "@openai/codex@0.145.0"
            cache: codex-0.145.0
            test: real_tool_codex
          - os: ubuntu-latest
            tool: claude
            package: "@anthropic-ai/claude-code@2.1.216"
            cache: claude-2.1.216
            test: real_tool_claude
          - os: ubuntu-latest
            tool: relay
            package: "@anthropic-ai/claude-code@2.1.216"
            cache: relay-claude-2.1.216
            test: test_relay_roundtrip
          - os: windows-latest
            tool: codex
            package: "@openai/codex@0.145.0"
            cache: codex-0.145.0
            test: real_tool_codex
          - os: windows-latest
            tool: claude
            package: "@anthropic-ai/claude-code@2.1.216"
            cache: claude-2.1.216
            test: real_tool_claude
          - os: windows-latest
            tool: relay
            package: "@anthropic-ai/claude-code@2.1.216"
            cache: relay-claude-2.1.216
            test: test_relay_roundtrip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 1.97.1
        with:
          toolchain: "1.97.1"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1
      - name: Configure Codex Linux sandbox
        if: runner.os == 'Linux' && matrix.tool == 'codex'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bubblewrap apparmor-profiles apparmor-utils
          sudo install -m 0644 \
            /usr/share/apparmor/extra-profiles/bwrap-userns-restrict \
            /etc/apparmor.d/bwrap-userns-restrict
          sudo apparmor_parser -r /etc/apparmor.d/bwrap-userns-restrict
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target/mock-tools
            target/npm-cache
          key: ${{ runner.os }}-mock-tools-${{ matrix.cache }}
      - name: Install pinned tool (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/install-mock-tools.sh '${{ matrix.package }}'
      - name: Add pinned tool to PATH (Unix)
        if: runner.os != 'Windows'
        run: echo "$PWD/target/mock-tools/bin" >> "$GITHUB_PATH"
      - name: Verify Codex Linux sandbox
        if: runner.os == 'Linux' && matrix.tool == 'codex'
        run: codex sandbox -- /bin/true
      - name: Install pinned tool (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/install-mock-tools.ps1 '${{ matrix.package }}'
      - name: Add pinned tool to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: (Resolve-Path target/mock-tools).Path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - shell: bash
        if: runner.os != 'Windows'
        run: cargo test --locked --test '${{ matrix.test }}' -- --ignored --nocapture --test-threads=1
      - shell: pwsh
        if: runner.os == 'Windows'
        run: cargo test --locked --test '${{ matrix.test }}' -- --ignored --nocapture --test-threads=1
