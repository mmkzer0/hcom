name: CI

on: [push, pull_request]

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pinned so a new stable release can't fail CI on a fresh lint with no
      # code change. Bump deliberately in its own PR. Local dev stays floating.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.97.1"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --locked

  # Native Windows test gate. Release artifacts are built by cargo-dist on tags;
  # the pinned real-tool lifecycle has its own matrix below.
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      # Pinned so a new stable release can't fail CI on a fresh lint with no
      # code change. Bump deliberately in its own PR. Local dev stays floating.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.97.1"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --all-targets --locked

  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: bash ./scripts/typecheck.sh

  real-tool-tests:
    name: Real tool (${{ matrix.tool }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            tool: codex
            package: "@openai/codex@0.141.0"
            cache: codex-0.141.0
            test: real_tool_codex
          - os: ubuntu-latest
            tool: claude
            package: "@anthropic-ai/claude-code@2.1.185"
            cache: claude-2.1.185
            test: real_tool_claude
          - os: ubuntu-latest
            tool: relay
            package: "@anthropic-ai/claude-code@2.1.185"
            cache: relay-claude-2.1.185
            test: test_relay_roundtrip
          - os: windows-latest
            tool: codex
            package: "@openai/codex@0.141.0"
            cache: codex-0.141.0
            test: real_tool_codex
          - os: windows-latest
            tool: claude
            package: "@anthropic-ai/claude-code@2.1.185"
            cache: claude-2.1.185
            test: real_tool_claude
          - os: windows-latest
            tool: relay
            package: "@anthropic-ai/claude-code@2.1.185"
            cache: relay-claude-2.1.185
            test: test_relay_roundtrip
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.97.1"
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: actions/cache@v4
        with:
          path: |
            target/mock-tools
            target/npm-cache
          key: ${{ runner.os }}-mock-tools-${{ matrix.cache }}
      - name: Install pinned tool (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/install-mock-tools.sh '${{ matrix.package }}'
      - name: Add pinned tool to PATH (Unix)
        if: runner.os != 'Windows'
        run: echo "$PWD/target/mock-tools/bin" >> "$GITHUB_PATH"
      - name: Install pinned tool (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/install-mock-tools.ps1 '${{ matrix.package }}'
      - name: Add pinned tool to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: (Resolve-Path target/mock-tools).Path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - shell: bash
        if: runner.os != 'Windows'
        run: cargo test --locked --test '${{ matrix.test }}' -- --ignored --nocapture --test-threads=1
      - shell: pwsh
        if: runner.os == 'Windows'
        run: cargo test --locked --test '${{ matrix.test }}' -- --ignored --nocapture --test-threads=1
