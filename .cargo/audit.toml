# cargo-audit configuration
#
# All ignored advisories below are transitive through `rumqttc 0.25.1` (the
# relay's MQTT/TLS stack). rumqttc 0.25.1 is the latest classic release and
# hard-pins `rustls-webpki = "0.102.8"`, so there is no clean version bump:
# patching webpki to 0.103 violates rumqttc's `^0.102` requirement.
#
# Reachability is effectively nil: rumqttc's only use of webpki 0.102 is a dead
# error variant -- `WebPki(#[from] webpki::Error)` in tls.rs -- with no calls to
# any verification, CRL, or name-constraint API. The actual TLS chain
# verification runs through tokio-rustls 0.26 -> rustls 0.23 -> rustls-webpki
# 0.103.x (the patched copy, also in Cargo.lock). The vulnerable 0.102 code is
# linked but never executed. The relay is also an opt-in remote feature.
#
# Revisit by 2026-10-21, when rumqttc ships a webpki-0.103 release, or if relay
# TLS adds custom certificate verification (CRLs / name constraints).

[advisories]
ignore = [
    "RUSTSEC-2026-0104", # rustls-webpki 0.102.8: panic in CRL parsing
    "RUSTSEC-2026-0098", # rustls-webpki 0.102.8: URI name constraints accepted
    "RUSTSEC-2026-0099", # rustls-webpki 0.102.8: wildcard name constraints accepted
    "RUSTSEC-2026-0049", # rustls-webpki 0.102.8: CRL not authoritative
    "RUSTSEC-2025-0134", # rustls-pemfile 2.2.0: unmaintained
]
